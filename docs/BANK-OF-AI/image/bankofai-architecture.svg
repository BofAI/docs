<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowReturn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowGrayStart" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="skills" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">How BANK OF AI Layers Work Together</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#64748b">Example: TRC20 Transfer · Transfer 100 TRX</text>

  <!-- ===== Return path (orthogonal L-shape, Blockchain → AI Agent) ===== -->
  <path d="M 180 787 L 30 787 L 30 248 L 58 248" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowReturn)"/>
  <text x="20" y="530" font-size="11" font-weight="700" fill="#059669" transform="rotate(-90, 20, 530)">Result → AI Agent</text>

  <!-- ===== Main downward flow ===== -->

  <!-- Layer 1: User -->
  <rect x="180" y="76" width="360" height="56" rx="12" fill="url(#top)" stroke="#0f172a" stroke-width="1.5"/>
  <text x="360" y="103" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">👤 You · Natural-Language Command</text>
  <text x="360" y="122" text-anchor="middle" font-size="12" fill="#cbd5e1">"Transfer 100 TRX to address T....XXXXX"</text>

  <!-- Bidirectional arrow: You ↔ AI Agent -->
  <line x1="360" y1="138" x2="360" y2="194" stroke="#94a3b8" stroke-width="2.5" marker-start="url(#arrowGrayStart)" marker-end="url(#arrowGray)"/>
  <text x="375" y="154" font-size="10" fill="#64748b">↑ AI reply</text>
  <text x="375" y="184" font-size="10" fill="#64748b">↓ Your command</text>

  <!-- Layer 2: AI Agent -->
  <rect x="60" y="202" width="600" height="92" rx="12" fill="url(#agent)" stroke="#6366f1" stroke-width="2"/>
  <text x="360" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#3730a3">🧠 AI Agent</text>
  <text x="360" y="252" text-anchor="middle" font-size="12" fill="#4f46e5">Powered by LLM Service · GPT / Claude / Gemini / DeepSeek / Kimi ...</text>
  <text x="360" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#6366f1">Parses the intent, picks the matching Skill</text>

  <!-- Agent → Skills arrow -->
  <line x1="360" y1="294" x2="360" y2="342" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Layer 3: Skills -->
  <rect x="120" y="346" width="480" height="92" rx="10" fill="url(#skills)" stroke="#6d28d9" stroke-width="2"/>
  <text x="360" y="374" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">🌟 Skills · trc20-token-toolkit</text>
  <text x="360" y="396" text-anchor="middle" font-size="12" fill="#ede9fe">Business Orchestration Layer</text>
  <text x="360" y="420" text-anchor="middle" font-size="10" fill="#c4b5fd">SOP: check balance → validate address → build tx → wait for confirmation</text>

  <!-- Skills → MCP arrow -->
  <line x1="360" y1="438" x2="360" y2="486" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Layer 4: TRON MCP Server -->
  <rect x="120" y="490" width="480" height="76" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="360" y="516" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">⚙️ TRON MCP Server</text>
  <text x="360" y="536" text-anchor="middle" font-size="11" fill="#64748b">Capability Provider Layer · On-chain atomic capability tools</text>
  <text x="360" y="555" text-anchor="middle" font-size="10" fill="#94a3b8">This example: build the TRC20 transfer transaction</text>

  <!-- MCP → Wallet arrow -->
  <line x1="360" y1="566" x2="360" y2="614" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)"/>

  <!-- Layer 5: Agent-Wallet -->
  <rect x="120" y="618" width="480" height="92" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="360" y="646" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">🔐 Agent-Wallet · Local Encrypted Wallet</text>
  <text x="360" y="668" text-anchor="middle" font-size="11" fill="#f97316">Private key never leaves your machine · Signed locally, then submitted on-chain</text>
  <text x="360" y="690" text-anchor="middle" font-size="10" fill="#c2410c">This example: local signing of the TRC20 transfer transaction</text>

  <!-- Wallet → Blockchain arrow -->
  <line x1="360" y1="710" x2="360" y2="758" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)"/>

  <!-- Layer 6: Blockchain -->
  <rect x="180" y="762" width="360" height="50" rx="12" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <text x="360" y="793" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">⛓️ TRON Blockchain</text>

  <!-- Legend -->
  <text x="60" y="860" font-size="10" font-weight="600" fill="#475569">Legend:</text>
  <line x1="115" y1="856" x2="145" y2="856" stroke="#6d28d9" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="151" y="860" font-size="10" fill="#475569">Skills orchestration</text>
  <line x1="275" y1="856" x2="305" y2="856" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <text x="311" y="860" font-size="10" fill="#475569">Sign / submit</text>
  <line x1="415" y1="856" x2="445" y2="856" stroke="#059669" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowReturn)"/>
  <text x="451" y="860" font-size="10" fill="#475569">Result feedback</text>
</svg>
