name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
      - update-mcp-server
      - ai-bankofai-patch-1
    tags:
      - 'test'
  pull_request:
    branches:
      - main
      - master
      - update-mcp-server
      - ai-bankofai-patch-1
  workflow_dispatch: # Intentionally unrestricted — allows manual builds from any branch for flexibility

env:
  IMAGE_NAME: bankofai/docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=test

      - name: Determine APP_ENV
        id: app_env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "APP_ENV=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "APP_ENV=production" >> $GITHUB_OUTPUT
          else
            echo "APP_ENV=development" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_ENV=${{ steps.app_env.outputs.APP_ENV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64